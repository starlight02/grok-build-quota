name: Dependabot auto-merge

# Dependabot PR 通过必需检查（Docker build）后自动合并。
# 前提（需在仓库设置里手动开启，代码无法代劳）：
#   1. Settings → General → 勾选 "Allow auto-merge"
#   2. Settings → Branches → main 分支保护规则里，把 docker.yml 的 "Build" 设为必需状态检查
# 有了必需检查后，--auto 只会在 Build 绿灯后才真正合并；major 破坏性变更若编译失败会卡住不合。

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # Dependabot 元数据（此处不做 update-type 过滤：按约定全部自动合并，含 major）
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # 先批准，满足分支保护里可能存在的 "require approval"
      - name: Approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 开启 auto-merge：GitHub 会等必需检查（Build）通过后自动 squash 合并并删分支
      - name: Enable auto-merge
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
